# CHAIN — example configuration
#
# Copy this to `PRIVATE__YOUR_FILES_GITIGNORED/chain.config.local.yaml` and edit it.
# The local copy is gitignored: it holds YOUR real folder locations and never enters
# git.
#
#   mkdir -p PRIVATE__YOUR_FILES_GITIGNORED
#   cp chain.config.example.yaml PRIVATE__YOUR_FILES_GITIGNORED/chain.config.local.yaml
#
# CHAIN adapts to where your writing ALREADY lives. You do not reorganize anything:
# you point CHAIN at your existing folders and files, and it maps them in place.
# Generated output always lands in the fixed, visible
# __READY_TO_REVIEW__PRIVATE_GITIGNORED/ — not configured here.

# --- The writable root CHAIN owns for its own machine state + library --------
# Holds library/ (ideas.csv, pieces.csv, the durable record CHAIN writes) and state/
# (ingestion ledger, cache — machine bookkeeping, never meant to be browsed). Default
# ~/.chain. May live anywhere OUTSIDE this repo. Kept out of git.
chain_home: ~/.chain

# --- Intake: how much model-assisted setup you want to pay for ---------------
# Full adaptive onboarding (assess/improve/create every editorial input at any
# maturity level): `python3 -m chain.intake` + the chain-intake agent. docs/intake.md.
# manual   : you map sources yourself below; deterministic indexing, ~no model cost.
# assisted : CHAIN samples a few files, proposes a mapping, you confirm (recommended).
# deep     : CHAIN inspects a broader/messier corpus and proposes a mapping (opt-in,
#            more token-intensive).
# Assisted/deep produce a DURABLE mapping written back here — they don't re-run every
# time. Normal runs read the saved mapping and inspect only new/changed files.
intake:
  mode: manual                 # manual | assisted | deep
  sample_size: 8               # files sampled per source in assisted/deep
  model: claude-haiku-4-5      # model used for assisted/deep proposals (cost control)

# --- Canon references (read-only; mapped in place, never copied) ------------
# Point these at files you already keep, or at seeded copies in chain_home. They are
# your voice and your positioning pillars — CHAIN reads them, never writes them.
voice_spec: "{chain_home}/voice-spec.md"
positioning_pillars: "{chain_home}/positioning-pillars.md"

# Personal lint additions (banned_phrases / watch_words / channels) layered onto the
# generic, persona-neutral rule set in lint_draft.py. Optional — see
# canon/lint-overrides.template.md for the format. Empty/unset = generic behavior.
lint_overrides: ""

# Optional: where your feedback ledger lives (referenced in draft-packet provenance).
feedback_ledger: ""

# --- Sources (your existing folders, read-only, mapped in place) ------------
# `type` is a free label for reading behavior (in V1 all text sources read alike).
# `roles` are small, generic, domain-agnostic hints about the KIND of signal a source
# carries — they tell Discover how to read it, and work for any field (a product PM's
# applications and a studio's client questions are both role `questions`). Recommended
# roles: published, drafts, questions, feedback, reviews, research, projects, offers,
# audience-needs, idea-source, reference, changes, custom. A source may have several;
# unknown roles are allowed. See docs/sources.md.
#
# Idea harvesting is generic: set `idea_marker` on ANY source that contains an
# explicitly-marked idea list. Nothing here is relocated; the layout below is only an
# example — use whatever structure you already have.
sources:
  - name: published
    type: text
    path: ~/path/to/your/published-writing
    roles: [published]
    include: ["*.txt", "*.md"]
    enabled: true

  - name: questions
    type: text                       # e.g. FAQs, client questions, application answers
    path: ~/path/to/your/questions
    roles: [questions, audience-needs]
    include: ["*.md", "*.txt"]
    enabled: true

  - name: feedback
    type: text                       # reviews, testimonials, replies
    path: ~/path/to/your/feedback
    roles: [feedback, reviews]
    include: ["*.md", "*.txt"]
    enabled: false

  - name: project
    type: repo
    path: ~/path/to/your/project
    roles: [projects, changes]
    include: ["*.md", "CHANGELOG*"]
    enabled: false

  # Any source may carry an explicitly-marked idea list — set its heading here.
  - name: idea-notes
    type: text
    path: ~/path/to/your/notes
    roles: [idea-source]
    include: ["*.md"]
    idea_marker: "Ideas"             # configurable heading — no filename is hard-coded
    enabled: false

# --- Defaults for a run (overridable per run spec; see examples/runs/) -------
defaults:
  channel: linkedin
  format: short_form
